<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimum Care Clinic Chat</title>
<style>
    :root { --primary: #008080; --bg: #f0f2f5; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .chat-container { width: 100%; max-width: 400px; height: 600px; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .header { background: var(--primary); color: white; padding: 15px; text-align: center; }
    .chat-box { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; }
    .msg { margin: 8px 0; padding: 12px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; }
    .bot { background: white; align-self: flex-start; border-bottom-right-radius: 2px; }
    .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
    
    /* Typing Indicator */
    .typing { display: flex; gap: 4px; padding: 10px; background: white; border-radius: 15px; width: fit-content; margin: 5px 0; }
    .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: wave 1.3s infinite; }
    .dot:nth-child(2) { animation-delay: -1.1s; }
    .dot:nth-child(3) { animation-delay: -0.9s; }
    @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

    .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; }
    #messageInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 25px; outline: none; margin-left: 10px; }
    .send-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <strong>سارة - استقبال أوبتمم كير</strong>
        <div style="font-size: 0.7rem; opacity: 0.8;">نشط الآن</div>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input id="messageInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");

    function addMessage(text, type="bot") {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.onload = () => addMessage("أهلاً بك في عيادة أوبتمم كير 🦷✨\nمعك سارة من خدمة العملاء، كيف يمكنني مساعدتك؟");

    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, "user");
        input.value = "";

        // إظهار النقاط المتموجة
        const typing = document.createElement("div");
        typing.id = "typing";
        typing.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chatBox.appendChild(typing);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            
            // تأخير طبيعي (ثانية ونصف)
            setTimeout(() => {
                document.getElementById("typing").remove();
                addMessage(data.reply);
            }, 1500);
        } catch {
            document.getElementById("typing").remove();
            addMessage("عذراً، حدث خطأ في الاتصال.");
        }
    }
</script>
</body>
</html>
