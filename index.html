<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Optimum Care Chat</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 360px;
  background: white;
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.chat-header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  height: 420px;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.bot { background: #eee; }
.user { background: #007bff; color: white; margin-left: auto; }

.buttons button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #007bff;
  color: white;
}

.input-area {
  display: flex;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button.send {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px;
}
</style>

</head>
<body>

<div class="chat-container">
  <div class="chat-header">Optimum Care Assistant</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="اكتب..." />
    <button class="send" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const API_URL = "https://dental-bot-api-production-106b.up.railway.app//chat";

function addMessage(text, type="bot") {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addButtons(buttons) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "buttons";

  buttons.forEach(btn => {
    const b = document.createElement("button");
    b.innerText = btn.text;
    b.onclick = btn.onClick;
    div.appendChild(b);
  });

  box.appendChild(div);
}

// أول رسالة
window.onload = () => {
  addMessage("أهلاً بيك 👋\nاختار الخدمة:");
  showMainServices();
};

// الخدمات الأساسية
function showMainServices() {
  addButtons([
    { text: "تبييض الأسنان", onClick: () => selectService("تبييض", "6000 جنيه") },
    { text: "زراعة الأسنان", onClick: () => selectService("زراعة", "8000 جنيه") },
    { text: "تقويم الأسنان", onClick: () => selectService("تقويم", "4000 جنيه") },
    { text: "عرض المزيد", onClick: showMore }
  ]);
}

// خدمات إضافية
function showMore() {
  addButtons([
    { text: "فينير", onClick: () => selectService("فينير", "12000 جنيه") },
    { text: "علاج جذور", onClick: () => selectService("حشو عصب", "1500 جنيه") }
  ]);
}

// اختيار خدمة
function selectService(name, price) {
  addMessage(`الخدمة: ${name} 💎\nالسعر يبدأ من ${price}`);
  
  addButtons([
    { text: "احجز الآن", onClick: showBookingForm }
  ]);
}

// فورم الحجز
function showBookingForm() {
  const html = `
  <div>
    <input id="name" placeholder="الاسم بالكامل"><br><br>

    <select id="country">
      <option value="+20">🇪🇬 مصر</option>
      <option value="+966">🇸🇦 السعودية</option>
      <option value="+971">🇦🇪 الإمارات</option>
    </select>

    <input id="phone" placeholder="رقم الهاتف"><br><br>

    <button onclick="submitBooking()">تأكيد الحجز</button>
  </div>
  `;
  addMessage(html);
}

// إرسال الحجز
async function submitBooking() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const code = document.getElementById("country").value;

  const fullPhone = code + phone;

  addMessage("تم إرسال بياناتك ✅", "user");

  await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: `name: ${name} phone: ${fullPhone}`
    })
  });

  addMessage("سيتم التواصل معك قريبًا 📞");
}

// إرسال رسالة عادية
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const msg = input.value;

  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();
  addMessage(data.reply);
}
</script>

</body>
</html>
