<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Optimum Care Dental Clinic</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    text-align: center;
}

h2 {
    color: #2c3e50;
}

#chat {
    width: 90%;
    max-width: 400px;
    height: 400px;
    background: white;
    margin: auto;
    overflow-y: auto;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.user {
    text-align: right;
    color: #2980b9;
    margin: 5px;
}

.bot {
    text-align: left;
    color: #27ae60;
    margin: 5px;
}

input, button {
    padding: 10px;
    margin-top: 10px;
    width: 200px;
}

button {
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #219150;
}

#booking {
    display: none;
    margin-top: 15px;
}

/* زر واتساب */
.whatsapp {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    background: #25D366;
    color: white;
    padding: 10px;
    border-radius: 8px;
}
</style>

</head>
<body>

<h2>🦷 Optimum Care Dental Clinic</h2>
<p>احجز كشفك الآن بسهولة 💬</p>

<div id="chat"></div>

<input id="msg" placeholder="اكتب رسالتك">
<br>
<button onclick="send()">إرسال</button>

<!-- فورم الحجز -->
<div id="booking">
    <h3>📞 احجز الآن</h3>
    <input id="name" placeholder="اسمك">
    <br>
    <input id="phone" placeholder="رقمك">
    <br>
    <button onclick="book()">تأكيد الحجز</button>
</div>

<!-- واتساب -->
<a class="whatsapp" href="https://wa.me/201XXXXXXXXX" target="_blank">
📲 تواصل واتساب مباشر
</a>

<script>
const API = "https://dental-bot-api-production-1c32.up.railway.app/chat";

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    chat.innerHTML += `<p class="${type}">${text}</p>`;
    chat.scrollTop = chat.scrollHeight;
}

// رسالة ترحيب تلقائية
window.onload = () => {
    addMessage("👋 أهلاً بيك في Optimum Care Dental Clinic", "bot");
    addMessage("تقدر تسأل عن (تبييض - زراعة - فينير) أو احجز مباشرة", "bot");
};

function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    addMessage("أنت: " + msg, "user");

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        addMessage("البوت: " + data.reply, "bot");

        // إظهار الحجز تلقائي
        if (
            msg.includes("حجز") ||
            msg.includes("احجز") ||
            data.reply.includes("جنيه")
        ) {
            document.getElementById("booking").style.display = "block";
        }
    })
    .catch(() => {
        addMessage("⚠️ حصل خطأ حاول تاني", "bot");
    });

    document.getElementById("msg").value = "";
}

function book() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if (!name || !phone) {
        alert("من فضلك ادخل الاسم ورقم الموبايل");
        return;
    }

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: `name: ${name}, phone: ${phone}`
        })
    })
    .then(res => res.json())
    .then(data => {
        addMessage("البوت: " + data.reply, "bot");
        document.getElementById("booking").style.display = "none";
    });
}
</script>

</body>
</html>
