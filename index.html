<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Optimum Care Chat</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 360px;
  background: white;
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.chat-header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  height: 420px;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.bot { background: #eee; }
.user { background: #007bff; color: white; margin-left: auto; }

.buttons button {
  margin: 5px;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #007bff;
  color: white;
}

.input-area {
  display: flex;
  border-top: 1px solid #ddd;
}

input, select {
  width: 90%;
  padding: 8px;
  margin-top: 5px;
}

button.send {
  background: #007bff;
  color: white;
  border: none;
  padding: 10px;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">Optimum Care Assistant</div>
  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="اكتب..." />
    <button class="send" onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
const API_URL = "https://YOUR-RAILWAY-URL/chat";

let selectedService = "";

// رسائل
function addMessage(text, type="bot") {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// أزرار
function addButtons(buttons) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "buttons";

  buttons.forEach(btn => {
    const b = document.createElement("button");
    b.innerText = btn.text;
    b.onclick = btn.onClick;
    div.appendChild(b);
  });

  box.appendChild(div);
}

// بداية
window.onload = () => {
  addMessage("أهلاً 👋 اختر الخدمة:");
  showServices();
};

function showServices() {
  addButtons([
    { text: "تبييض", onClick: () => selectService("تبييض", "6000") },
    { text: "زراعة", onClick: () => selectService("زراعة", "8000") },
    { text: "فينير", onClick: () => selectService("فينير", "12000") }
  ]);
}

function selectService(name, price) {
  selectedService = name;
  addMessage(`الخدمة: ${name} 💎 السعر يبدأ من ${price}`);
  addButtons([{ text: "احجز الآن", onClick: showForm }]);
}

// 🔥 الفورم بعد الإصلاح
function showForm() {
  addMessage(`
    <div id="bookingForm">
      <input id="name" placeholder="الاسم بالكامل">

      <select id="country">
        <option value="+20">🇪🇬 مصر</option>
        <option value="+966">🇸🇦 السعودية</option>
        <option value="+971">🇦🇪 الإمارات</option>
      </select>

      <input id="phone" placeholder="رقم الهاتف">

      <button id="submitBtn">تأكيد الحجز</button>
    </div>
  `);

  setTimeout(() => {
    document.getElementById("submitBtn").onclick = submitBooking;
  }, 100);
}

// 🔥 Validation + أسباب الرفض
function validate(name, phone) {
  if (name.length < 3) {
    return "❌ الاسم لازم يكون 3 حروف على الأقل";
  }

  if (!/^[a-zA-Z\u0600-\u06FF\s]+$/.test(name)) {
    return "❌ الاسم لازم يكون حروف فقط بدون أرقام";
  }

  if (!/^[0-9]{8,15}$/.test(phone)) {
    return "❌ رقم الهاتف لازم يكون من 8 لـ 15 رقم";
  }

  return null;
}

// إرسال الحجز
async function submitBooking() {
  const name = document.getElementById("name")?.value.trim();
  const phone = document.getElementById("phone")?.value.trim();
  const code = document.getElementById("country")?.value;

  const error = validate(name, phone);

  if (error) {
    addMessage(error);
    return;
  }

  const fullPhone = code + phone;

  addMessage("⏳ جاري إرسال البيانات...");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        message: `name: ${name} phone: ${fullPhone} service: ${selectedService}`
      })
    });

    const data = await res.json();

    addMessage(data.reply || "تم الحجز ✅");

  } catch (e) {
    addMessage("❌ حصل خطأ في الاتصال بالسيرفر");
  }
}

// رسالة عادية
async function sendMessage() {
  const input = document.getElementById("messageInput");
  const msg = input.value;

  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();
  addMessage(data.reply);
}
</script>

</body>
</html>
