<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimum Care Dental Clinic Chat</title>
<style>
    :root {
        --primary-color: #008080; /* Teal - لون عيادات الأسنان */
        --secondary-color: #f8f9fa;
        --accent-color: #ffd700; /* Gold للعروسة */
        --bot-msg: #ffffff;
        --user-msg: #008080;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #e9ecef;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .chat-container {
        width: 100%;
        max-width: 400px;
        height: 600px;
        background: white;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    .chat-header {
        background: var(--primary-color);
        color: white;
        padding: 20px;
        text-align: center;
    }
    .chat-header h2 { margin: 0; font-size: 1.2rem; }
    .chat-header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.9; }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #f0f2f5;
        display: flex;
        flex-direction: column;
    }
    .message {
        margin: 8px 0;
        padding: 12px 16px;
        border-radius: 15px;
        max-width: 85%;
        line-height: 1.5;
        font-size: 0.95rem;
        position: relative;
    }
    .bot { 
        background: var(--bot-msg); 
        color: #333; 
        align-self: flex-start;
        border-bottom-right-radius: 2px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .user { 
        background: var(--user-msg); 
        color: white; 
        align-self: flex-end;
        border-bottom-left-radius: 2px;
    }
    .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
    }
    .buttons button {
        padding: 8px 15px;
        border: 1px solid var(--primary-color);
        border-radius: 20px;
        background: white;
        color: var(--primary-color);
        cursor: pointer;
        transition: 0.3s;
        font-size: 0.85rem;
    }
    .buttons button:hover {
        background: var(--primary-color);
        color: white;
    }
    .form-container {
        background: white;
        padding: 15px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-top: 10px;
    }
    .form-container input, .form-container select {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
    }
    .submit-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    .input-area {
        display: flex;
        padding: 15px;
        background: white;
        border-top: 1px solid #eee;
    }
    #messageInput {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 25px;
        outline: none;
        margin-left: 10px;
    }
    .send-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>Optimum Care Clinic</h2>
        <p>د. هبة عمار - استشاري تجميل الأسنان</p>
    </div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input id="messageInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)" />
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
const API_URL = "/chat"; // تأكد أن المسار مطابق لـ Railway
let selectedService = "";

function addMessage(text, type="bot") {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = text.replace(/\n/g, '<br>');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function addButtons(buttons) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "buttons";
    buttons.forEach(btn => {
        const b = document.createElement("button");
        b.innerText = btn.text;
        b.onclick = btn.onClick;
        div.appendChild(b);
    });
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

window.onload = () => {
    addMessage("أهلاً بك في عيادة أوبتمم كير 🦷✨\nأنا مساعدك الذكي، كيف يمكنني مساعدتك اليوم؟");
    showMainServices();
};

function showMainServices() {
    addButtons([
        { text: "💰 الأسعار", onClick: () => selectService("كشف", "350") },
        { text: "💍 عرض العروسة", onClick: () => selectService("عروسة", "4000") },
        { text: "🦷 تجميل الأسنان", onClick: () => selectService("تبييض", "6000") },
        { text: "📏 التقويم", onClick: () => selectService("تقويم", "400") },
        { text: "🚨 طوارئ", onClick: () => selectService("طوارئ", "1200") }
    ]);
}

async function selectService(name, price) {
    selectedService = name;
    addMessage(`خدمة ${name}: السعر يبدأ من ${price} ج.م 👌`, "bot");
    addButtons([{ text: "حجز موعد الآن", onClick: showForm }]);
}

function showForm() {
    addMessage("من فضلك ادخل بياناتك لنتواصل معك وتأكيد الحجز:");
    const formDiv = document.createElement("div");
    formDiv.className = "form-container";
    formDiv.innerHTML = `
        <input id="userName" placeholder="الاسم الثلاثي">
        <select id="countryCode">
            <option value="+20">🇪🇬 مصر (+20)</option>
            <option value="+966">🇸🇦 السعودية (+966)</option>
        </select>
        <input id="userPhone" type="tel" placeholder="رقم الموبايل">
        <button class="submit-btn" onclick="submitBooking()">تأكيد الحجز ✅</button>
    `;
    document.getElementById("chatBox").appendChild(formDiv);
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
}

async function submitBooking() {
    const name = document.getElementById("userName").value.trim();
    const phone = document.getElementById("userPhone").value.trim();
    const code = document.getElementById("countryCode").value;

    if(name.length < 3 || phone.length < 10) {
        alert("يرجى إدخال بيانات صحيحة");
        return;
    }

    addMessage(`الاسم: ${name}\nالهاتف: ${code}${phone}`, "user");
    
    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: `حجز خدمة ${selectedService} للاسم ${name} هاتف ${code}${phone}` })
        });
        const data = await res.json();
        addMessage(data.reply);
    } catch (e) {
        addMessage("عذراً، حدث خطأ في الاتصال. حاول مرة أخرى.");
    }
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        addMessage(data.reply);
    } catch (e) {
        addMessage("عذراً، أنا أواجه مشكلة في الرد حالياً.");
    }
}

function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
</script>
</body>
</html>
