<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimum Care</title>
    <style>
        :root { --primary: #008080; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 400px; height: 620px; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--primary); color: white; padding: 18px; text-align: center; font-weight: bold; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); display: flex; flex-direction: column; }
        .msg { margin: 8px 0; padding: 12px 16px; border-radius: 18px; max-width: 82%; font-size: 0.95rem; line-height: 1.5; }
        .bot { background: white; align-self: flex-start; border-bottom-right-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
        .typing { display: flex; gap: 4px; padding: 12px; background: white; border-radius: 15px; width: fit-content; margin: 5px 0; }
        .dot { width: 6px; height: 6px; background: #adb5bd; border-radius: 50%; animation: wave 1.3s infinite; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
        .btn-group button { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .btn-group button:hover { background: var(--primary); color: white; }
        .form-box { background: white; padding: 15px; border-radius: 15px; border: 1px solid #dee2e6; margin-top: 10px; }
        .form-box input, .form-box select { width: 100%; padding: 11px; margin: 6px 0; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
        #messageInput { flex: 1; padding: 12px 18px; border: 1px solid #ced4da; border-radius: 25px; outline: none; margin-left: 10px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">سارة - استقبال أوبتمم كير</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input id="messageInput" placeholder="اكتب استفسارك هنا..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="background:none; border:none; color:var(--primary); font-size:1.6rem; cursor:pointer;">➤</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    let activeService = "";

    function addMessage(text, type="bot", isHTML=false) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        if(isHTML) div.innerHTML = text; else div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping(callback) {
        const t = document.createElement("div"); t.id = "typing";
        t.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chatBox.appendChild(t); chatBox.scrollTop = chatBox.scrollHeight;
        setTimeout(() => { t.remove(); callback(); }, 1500);
    }

    function showServices() {
        const services = ["تبييض الأسنان", "زراعة أسنان", "تقويم شفاف", "عرض العروسة", "حالة طوارئ"];
        const div = document.createElement("div"); div.className = "btn-group";
        services.forEach(s => {
            const b = document.createElement("button"); b.innerText = s;
            b.onclick = () => { addMessage(s, "user"); handleBotResponse(s); };
            div.appendChild(b);
        });
        chatBox.appendChild(div);
    }

    window.onload = () => {
        addMessage("أهلاً بك في عيادة أوبتمم كير ✨\nمعك سارة، كيف يمكنني مساعدتك اليوم؟");
        showServices();
    };

    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const msg = input.value.trim();
        if(!msg) return; addMessage(msg, "user"); input.value = "";
        handleBotResponse(msg);
    }

    async function handleBotResponse(msg) {
        showTyping(async () => {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            addMessage(data.reply);
            if(data.current_service) activeService = data.current_service;
            if(data.show_services) showServices();
            if(data.reply.includes("اسمك الثلاثي")) showForm();
        });
    }

    function showForm() {
        const div = document.createElement("div"); div.className = "form-box";
        div.innerHTML = `
            <input id="fName" placeholder="الاسم الثلاثي">
            <select id="fCode"><option value="+20">🇪🇬 مصر</option><option value="+966">🇸🇦 السعودية</option></select>
            <input id="fPhone" type="tel" placeholder="رقم الموبايل">
            <button class="submit-btn" onclick="processForm()">تأكيد البيانات وإرسال الطلب ✅</button>
        `;
        chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
    }

async function processForm() {
    const name = document.getElementById("fName").value;
    const phone = document.getElementById("fPhone").value;
    const code = document.getElementById("fCode").value;
    
    if(name.length < 3 || phone.length < 8) return alert("يرجى إكمال البيانات");

    // إرسال البيانات كأوبجكت JSON وليس كنص مجرد لمنع أخطاء الـ Parsing
    showTyping(async () => {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ 
                message: {
                    type: "final_booking",
                    name: name,
                    phone: code + phone,
                    service: activeService
                }
            })
        });
        const data = await res.json();
        addMessage(data.reply);
    });
}

</script>
</body>
</html>
