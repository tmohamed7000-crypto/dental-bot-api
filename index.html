<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dental Bot</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

#chat {
    width: 90%;
    max-width: 400px;
    height: 400px;
    background: white;
    margin: auto;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
}

.user {
    text-align: right;
    color: blue;
}

.bot {
    text-align: left;
    color: green;
}

input, button {
    padding: 10px;
    margin-top: 10px;
}

#booking {
    display: none;
    margin-top: 15px;
}
</style>

</head>
<body>

<h2>💬 احجز مع العيادة</h2>

<div id="chat"></div>

<input id="msg" placeholder="اكتب رسالتك">
<br>
<button onclick="send()">إرسال</button>

<div id="booking">
    <h3>📞 احجز الآن</h3>
    <input id="name" placeholder="اسمك">
    <br>
    <input id="phone" placeholder="رقمك">
    <br>
    <button onclick="book()">تأكيد الحجز</button>
</div>

<script>
const API = "https://dental-bot-api-production-1c32.up.railway.app/";

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    chat.innerHTML += `<p class="${type}">${text}</p>`;
    chat.scrollTop = chat.scrollHeight;
}

function send() {
    let msg = document.getElementById("msg").value;

    addMessage("أنت: " + msg, "user");

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        addMessage("البوت: " + data.reply, "bot");

        // لو فيه كلمة حجز → يظهر الفورم
        if (data.reply.includes("ابعت") || data.reply.includes("حجز")) {
            document.getElementById("booking").style.display = "block";
        }
    });

    document.getElementById("msg").value = "";
}

function book() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: `name: ${name}, phone: ${phone}`
        })
    })
    .then(res => res.json())
    .then(data => {
        addMessage("البوت: " + data.reply, "bot");
        document.getElementById("booking").style.display = "none";
    });
}
</script>

</body>
</html>
